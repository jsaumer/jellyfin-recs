# CI: lint + smoke tests on every push/PR. No secrets or Docker needed.
name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt pyyaml
      - name: Lint (compile + yaml + sh)
        run: |
          python -c "import py_compile,glob; [py_compile.compile(f,doraise=True) for f in glob.glob('src/jellyfin_recs/*.py')+glob.glob('tests/*.py')]; print('python OK')"
          python -c "import yaml; [yaml.safe_load(open(f)) for f in ['deploy/docker-compose.yaml','deploy/compose.local.yml']]; print('yaml OK')"
          sh -n deploy/entrypoint.sh && echo "entrypoint OK"
      - name: Smoke tests
        run: PYTHONPATH=src python tests/smoke_test.py
