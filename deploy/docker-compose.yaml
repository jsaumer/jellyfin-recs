version: "3.9"

services:
  jellyfin-recs:
    image: ${IMAGE:-ghcr.io/jsaumer/jellyfin-recs:0.2.0}
    # Pinned to a specific version. Bump this tag (or override the IMAGE env var
    # in Komodo) to deploy a new release. Published to GHCR by the GitHub Actions
    # release workflow on every `git push` of a `v*.*.*` tag.
    volumes:
      # NFS-backed so the data dir (recs, approvals, seed files) is shared
      # across nodes — the service can run on any worker without pinning.
      - /mnt/nfs/container/jellyfin-recs/data:/data
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - DATA_DIR=/data
      # ---- Jellyfin ----
      - JELLYFIN_URL=${JELLYFIN_URL:-http://jellyfin:8096}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY}
      - JELLYFIN_USERNAME=${JELLYFIN_USERNAME:-saumz}
      # ---- Claude / Anthropic ----
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - RECS_PER_GENRE=${RECS_PER_GENRE:-5}
      - REFRESH_INTERVAL_HOURS=${REFRESH_INTERVAL_HOURS:-168}
      # ---- Radarr / Sonarr (staging; dormant until enabled) ----
      - STAGING_ENABLED=${STAGING_ENABLED:-false}
      - RADARR_URL=${RADARR_URL:-http://radarr:7878}
      - RADARR_API_KEY=${RADARR_API_KEY}
      - RADARR_ROOT_FOLDER=${RADARR_ROOT_FOLDER:-/movies}
      - SONARR_URL=${SONARR_URL:-http://sonarr:8989}
      - SONARR_API_KEY=${SONARR_API_KEY}
      - SONARR_TV_ROOT_HINT=${SONARR_TV_ROOT_HINT:-/tv}
      - SONARR_CARTOON_ROOT_HINT=${SONARR_CARTOON_ROOT_HINT:-/cartoon}
    networks:
      - traefik-public
    deploy:
      resources:
        limits:
          memory: 512M
      replicas: 1
      update_config:
        parallelism: 2
        delay: 10s
        order: stop-first
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - "node.role==worker"
      labels:
        - "dockns.technitium01.record=A"
        - "dockns.technitium01.name=jellyfin-recs.saumer.cloud"
        - "dockns.technitium01.ip=172.16.50.35"
        - "dockns.technitium01.ttl=5400"
        - "traefik.enable=true"
        - "traefik.http.routers.jellyfin-recs.rule=Host(`jellyfin-recs.saumer.cloud`)"
        - "traefik.http.routers.jellyfin-recs.entrypoints=websecure"
        - "traefik.http.routers.jellyfin-recs.tls=true"
        - "traefik.http.routers.jellyfin-recs.tls.certresolver=cloudflare"
        - "traefik.http.services.jellyfin-recs.loadbalancer.server.port=8577"

networks:
  traefik-public:
    external: true
